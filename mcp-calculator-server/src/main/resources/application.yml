server:
  port: 8081

spring:
  ai:
    mcp:
      server:
        name: calculator-server
        version: 1.0.0
  # SMTP 邮件配置（QQ 邮箱）
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:your-qq@qq.com}
    password: ${MAIL_PASSWORD:your-auth-code}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
