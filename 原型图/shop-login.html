<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花之恋 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFE0E6 0%, #FFB6C1 30%, #C71526 100%);
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    /* 装饰花朵 */
    .deco { position: absolute; font-size: 48px; opacity: 0.3; animation: float 6s ease-in-out infinite; }
    .deco-1 { top: 10%; left: 8%; }
    .deco-2 { top: 60%; left: 5%; font-size: 64px; animation-delay: 2s; }
    .deco-3 { top: 15%; right: 10%; font-size: 56px; animation-delay: 1s; }
    .deco-4 { bottom: 15%; right: 8%; font-size: 40px; animation-delay: 3s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }

    /* Logo */
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 56px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
    .logo-title { margin: 12px 0 6px; font-size: 32px; color: #fff; font-weight: bold; letter-spacing: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .logo-subtitle { color: rgba(255,255,255,0.85); font-size: 14px; }

    /* 卡片 */
    .card { background: #fff; border-radius: 16px; box-shadow: 0 0 12px rgba(0,0,0,0.12); padding: 28px 32px 16px; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
    .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 16px; font-weight: 500; cursor: pointer; color: #999; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #C71526; border-bottom-color: #C71526; }

    /* 表单 */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
    .form-input {
      width: 100%; height: 40px; padding: 0 12px 0 36px;
      border: 1px solid #DCDFE6; border-radius: 4px; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #C71526; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #999; }

    .submit-btn {
      width: 100%; height: 40px; margin-top: 8px;
      background: #C71526; color: #fff; border: none; border-radius: 4px;
      font-size: 16px; letter-spacing: 4px; cursor: pointer;
    }
    .submit-btn:hover { background: #A01020; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <span class="deco deco-1">🌸</span>
  <span class="deco deco-2">🌹</span>
  <span class="deco deco-3">🌷</span>
  <span class="deco deco-4">💐</span>

  <div class="container">
    <div class="logo">
      <div class="logo-icon">🌸</div>
      <h2 class="logo-title">花之恋</h2>
      <p class="logo-subtitle">每一束花，都是爱的告白</p>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">登录</div>
        <div class="tab" onclick="switchTab('register')">注册</div>
      </div>

      <!-- 登录表单 -->
      <div id="login-form">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input class="form-input" type="text" placeholder="请输入用户名">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" placeholder="请输入密码">
          </div>
        </div>
        <button class="submit-btn">登 录</button>
      </div>

      <!-- 注册表单 -->
      <div id="register-form" class="hidden">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input class="form-input" type="text" placeholder="请输入用户名">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" placeholder="请输入密码（至少6位）">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <div class="input-wrap">
            <span class="input-icon">📱</span>
            <input class="form-input" type="text" placeholder="请输入手机号">
          </div>
        </div>
        <button class="submit-btn">注 册</button>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        document.querySelector('.tab:first-child').classList.add('active');
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('register-form').classList.add('hidden');
      } else {
        document.querySelector('.tab:last-child').classList.add('active');
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('register-form').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
