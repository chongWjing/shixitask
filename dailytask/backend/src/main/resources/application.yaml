# ============================================
# 花之恋鲜花电商平台 - 主配置文件
# ============================================
# 本地开发请创建 application-local.yaml 并配置：
#   spring.ai.openai.api-key: your-api-key-here
# 启动时添加参数：--spring.profiles.active=local
# ============================================

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopaisx?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.7
    # MCP Client 配置（需要先构建 mcp-calculator-server）
    # mcp:
    #   client:
    #     servers:
    #       calculator:
    #         command: java
    #         args:
    #           - -jar
    #           - C:/Users/W2774/Desktop/实习作业/mcp-calculator-server/target/mcp-calculator-server-0.0.1-SNAPSHOT.jar

mybatis-plus:
  mapper-locations: classpath*:com/lbya/backend/mapper/*.xml
  type-aliases-package: com.lbya.backend.entity
  configuration:
    map-underscore-to-camel-case: true
